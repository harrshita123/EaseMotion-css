<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Grid Long Title Fix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card-grid">

    <div class="card">
        <h2 class="card-title">Profile</h2>
        <p>Short description about the profile card.</p>
        <button>View</button>
    </div>

    <div class="card">
        <h2 class="card-title">
            This is a very long card title that wraps onto multiple lines but keeps every card aligned perfectly
        </h2>
        <p>Another description showing the layout remains consistent even with longer headings.</p>
        <button>View</button>
    </div>

    <div class="card">
        <h2 class="card-title">Statistics</h2>
        <p>Responsive dashboard statistics card.</p>
        <button>View</button>
    </div>

</div>

</body>
</html>
