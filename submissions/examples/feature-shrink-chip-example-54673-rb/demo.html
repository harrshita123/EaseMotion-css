<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shrink Chip Demo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="demo-wrapper-rb">
    <div class="demo-card-rb">
      <h1>Shrink Chips</h1>
      <p class="demo-desc-rb">Hover or click the filter chips below to see them shrink dynamically to reflect interactions.</p>
      
      <div class="shrink-chips-container-rb">
        <button class="shrink-chip-rb active-chip-rb" aria-pressed="true">Design</button>
        <button class="shrink-chip-rb" aria-pressed="false">Coding</button>
        <button class="shrink-chip-rb" aria-pressed="false">Marketing</button>
        <button class="shrink-chip-rb" aria-pressed="false">DevOps</button>
        <button class="shrink-chip-rb" aria-pressed="false">QA Testing</button>
      </div>
    </div>
  </div>
</body>
</html>
