<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float Label Demo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="demo-wrapper-rb">
    <div class="demo-card-rb">
      <h1>Float Label Input</h1>
      <p class="demo-desc-rb">Click inside the inputs below to see the labels float up smoothly in response to focus and content.</p>
      
      <div class="float-input-group-rb">
        <input type="text" id="email-input" class="float-input-rb" placeholder=" " required autocomplete="off">
        <label for="email-input" class="float-label-rb">Email Address</label>
      </div>

      <div class="float-input-group-rb" style="margin-top: 1.5rem;">
        <input type="password" id="password-input" class="float-input-rb" placeholder=" " required>
        <label for="password-input" class="float-label-rb">Password</label>
      </div>
    </div>
  </div>
</body>
</html>
