<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spring Skeleton Example</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <article
        class="spring-skeleton-example-ag"
        aria-label="Loading content"
        aria-busy="true"
      >
        <div class="skeleton-avatar-ag"></div>

        <div class="skeleton-details-ag">
          <div class="skeleton-line-ag"></div>
          <div class="skeleton-line-ag medium-ag"></div>
          <div class="skeleton-line-ag small-ag"></div>
        </div>
      </article>
    </main>
  </body>
</html>
